<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合唱団じゃがいも 演奏曲目データベース</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 95%;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .search-box {
            margin-bottom: 20px;
            text-align: center;
        }
        .search-box input {
            width: 80%;
            max-width: 400px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        
        /* スクロールを確実にするためのラッパー */
        .table-wrapper {
            width: 100%;
            max-height: 75vh; /* ★追加：表の高さをブラウザ画面の高さの75%に制限します */
            overflow: auto;    /* ★変更：はみ出した場合は縦も横もスクロールさせます */
            margin-top: 10px;
            border: 1px solid #ddd;
        }

        /* 既存の table などの設定はそのまま */
        table {
            width: 100%;
            border-collapse: collapse;
            /* 変更: white-space: nowrap; を削除し、折り返しを許可します */
        }
        
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
            font-size: 0.95rem;
            
            /* ▼ 追加: 列幅の制限と折り返しの設定 ▼ */
            white-space: normal;       /* 文字の折り返しを許可 */
            overflow-wrap: break-word; /* 長い英単語やURLも枠内で強制的に折り返す */
            min-width: 250px;           /* 各列が最低限確保する幅 */
            max-width: 250px;          /* ★この幅を超えたら折り返す（数値は調整可能です） */
            
            /* ▼魔法の1行：ブラウザに幅の指定を絶対に守らせる▼ */
            box-sizing: border-box;            
        }

        th {
            background-color: #3498db;
            color: white;
            position: sticky; /* ★追加：縦スクロールしても見出しを上部に固定します */
            top: 0;           /* ★追加：固定する位置（一番上） */
            z-index: 10;      /* ★追加：他の文字より手前に表示させます */
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        tr:hover {
            background-color: #e8f4f8;
        }
        #loading {
            text-align: center;
            color: #666;
            font-size: 1.2rem;
            margin: 20px 0;
        }
        /* スクロールバーのデザイン */
        .table-wrapper::-webkit-scrollbar {
            height: 12px;
        }
        .table-wrapper::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .table-wrapper::-webkit-scrollbar-thumb {
            background: #bbb;
            border-radius: 6px;
        }
        .table-wrapper::-webkit-scrollbar-thumb:hover {
            background: #888;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>合唱団じゃがいも 演奏曲目データベース</h1>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="演奏会名、曲名、指揮者、作曲者などで検索..." onkeyup="filterTable()">
    </div>

    <div id="loading">データベースを読み込んでいます...</div>

    <div class="table-wrapper">
        <table id="dataTable" style="display:none;">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const csvFileName = 'じゃがいも演奏曲目データベース.csv';

    Papa.parse(csvFileName, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            // 【修正部分】 CSVの1行目（ヘッダー）をPapaParseの機能で正確に取得
            const headers = results.meta.fields;
            const data = results.data;
            displayData(headers, data);
        },
        error: function(err) {
            document.getElementById('loading').innerText = 'データの読み込みに失敗しました。';
            console.error(err);
        }
    });

    function displayData(headers, data) {
        if (!headers || headers.length === 0) return;

        const thead = document.getElementById('tableHead');
        const tbody = document.getElementById('tableBody');
        thead.innerHTML = '';
        tbody.innerHTML = '';

        // 見出し行の生成
        const headerRow = document.createElement('tr');
        headers.forEach(header => {
            const th = document.createElement('th');
            th.textContent = header;
            headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);

        // データ行の生成
        data.forEach(row => {
            if (!row['演奏会名']) return; // 演奏会名がない空行はスキップ

            const tr = document.createElement('tr');
            headers.forEach(header => {
                const td = document.createElement('td');
                td.textContent = row[header] || '';
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });

        document.getElementById('loading').style.display = 'none';
        document.getElementById('dataTable').style.display = 'table';
    }

    function filterTable() {
        const input = document.getElementById('searchInput');
        const filter = input.value.toLowerCase();
        const table = document.getElementById('dataTable');
        const tr = table.getElementsByTagName('tr');

        for (let i = 1; i < tr.length; i++) {
            let rowText = tr[i].textContent || tr[i].innerText;
            if (rowText.toLowerCase().indexOf(filter) > -1) {
                tr[i].style.display = '';
            } else {
                tr[i].style.display = 'none';
            }
        }
    }
</script>

</body>
</html>
