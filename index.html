<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合唱団じゃがいも 演奏曲目データベース</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px; /* 全列表示に合わせて少し幅を広げました */
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .search-box {
            margin-bottom: 20px;
            text-align: center;
        }
        .search-box input {
            width: 80%;
            max-width: 400px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .table-responsive {
            overflow-x: auto; /* 画面より表が広い場合は横スクロールになります */
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            white-space: nowrap; /* セル内の文字の折り返しを防止 */
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
            font-size: 0.95rem;
        }
        th {
            background-color: #3498db;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        tr:hover {
            background-color: #e8f4f8;
        }
        #loading {
            text-align: center;
            color: #666;
            font-size: 1.2rem;
            margin: 20px 0;
        }
        .table-responsive {
            /* auto を scroll に変更して、強制的にバー（レール部分）を表示させます */
            overflow-x: scroll; 
            /* バーが表と被らないように少し余白を設けます */
            padding-bottom: 10px; 
        }
        /* 横スクロールバーを常に表示して目立たせる設定 */
        .table-responsive::-webkit-scrollbar {
            height: 12px;
        }
        .table-responsive::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        .table-responsive::-webkit-scrollbar-thumb {
            background: #bbb;
            border-radius: 4px;
        }
        .table-responsive::-webkit-scrollbar-thumb:hover {
            background: #888;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>合唱団じゃがいも 演奏曲目データベース</h1>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="演奏会名、曲名、指揮者、作曲者などで検索..." onkeyup="filterTable()">
    </div>

    <div id="loading">データベースを読み込んでいます...</div>

    <div class="table-responsive">
        <table id="dataTable" style="display:none;">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const csvFileName = 'じゃがいも演奏曲目データベース.csv';

    Papa.parse(csvFileName, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            const data = results.data;
            displayData(data);
        },
        error: function(err) {
            document.getElementById('loading').innerText = 'データの読み込みに失敗しました。';
            console.error(err);
        }
    });

    function displayData(data) {
        if (data.length === 0) return;

        const thead = document.getElementById('tableHead');
        const tbody = document.getElementById('tableBody');
        thead.innerHTML = '';
        tbody.innerHTML = '';

        // 【変更点1】CSVの1行目から項目名（列名）をすべて自動取得して見出しを作る
        const headers = Object.keys(data[0]);
        const headerRow = document.createElement('tr');
        headers.forEach(header => {
            const th = document.createElement('th');
            th.textContent = header;
            headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);

        // 【変更点2】取得した項目名に合わせて、各行のデータをすべて表示する
        data.forEach(row => {
            if (!row['演奏会名']) return; // 空のデータはスキップ

            const tr = document.createElement('tr');
            
            headers.forEach(header => {
                const td = document.createElement('td');
                td.textContent = row[header] || ''; // セルにデータを挿入
                tr.appendChild(td);
            });
            
            tbody.appendChild(tr);
        });

        document.getElementById('loading').style.display = 'none';
        document.getElementById('dataTable').style.display = 'table';
    }

    function filterTable() {
        const input = document.getElementById('searchInput');
        const filter = input.value.toLowerCase();
        const table = document.getElementById('dataTable');
        const tr = table.getElementsByTagName('tr');

        for (let i = 1; i < tr.length; i++) {
            let rowText = tr[i].textContent || tr[i].innerText;
            if (rowText.toLowerCase().indexOf(filter) > -1) {
                tr[i].style.display = '';
            } else {
                tr[i].style.display = 'none';
            }
        }
    }
</script>

</body>
</html>
